<section class="projects-page">

    <h1>Projects</h1>
    <p>Click a project to view more details.</p>

    <div class="project-grid">

        <div class="project-card"
            data-title="POS System"
            data-image="assets/images/pos.png"
            data-desc="A full stack retail POS system with inventory management and checkout."
            data-tech="HTML • CSS • JavaScript • Node.js • Express • MySQL">

            <img src="assets/images/pos.png">

            <div class="project-info">
                <h3>POS System</h3>
                <p>Retail Store Management</p>
            </div>

        </div>

        <div class="project-card"
            data-title="Gold Price Tracker"
            data-image="assets/images/gold.png"
            data-desc="Linux mini-computer that tracks gold prices 24/7."
            data-tech="Linux • Python • Cron">

            <img src="assets/images/gold.png">

            <div class="project-info">
                <h3>Gold Price Tracker</h3>
                <p>Embedded Linux Project</p>
            </div>

        </div>

        <div class="project-card"
            data-title="Chess AI"
            data-image="assets/images/chess.png"
            data-desc="Chess AI using Minimax and Alpha Beta pruning."
            data-tech="Java • AI">

            <img src="assets/images/chess.jpg">

            <div class="project-info">
                <h3>Chess AI</h3>
                <p>Artificial Intelligence</p>
            </div>

        </div>

    </div>

</section>


<!-- Modal -->

<div class="modal" id="projectModal">

        <span class="close">&times;</span>

        <img id="modalImage">

        <p id="modalTech"></p>

        <p id="modalDesc"></p>

        <div class="modal-buttons">

            <a href="#">Live Demo</a>

    </div>

</div>
